<svg viewBox="0 0 800 250" width="100%" xmlns="http://www.w3.org/2000/svg" style="background:#0f172a; border-radius:12px;">
    <rect width="800" height="250" fill="#0f172a" rx="12"/>
    
    <!-- Cloud Node -->
    <rect x="40" y="75" width="120" height="100" rx="8" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
    <text x="100" y="115" fill="#bae6fd" font-size="16" text-anchor="middle" font-weight="bold">Cloud Server</text>
    <text x="100" y="145" fill="#7dd3fc" font-size="11" text-anchor="middle">Offline Msg Queue</text>

    <!-- Disconnected Connection -->
    <path d="M 170 110 L 250 110" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="6,6"/>
    <text x="210" y="100" fill="#f87171" font-size="12" text-anchor="middle" font-weight="bold">Disconnected ❌</text>

    <!-- Web Push arrow -->
    <path d="M 170 140 Q 210 160 250 140" fill="none" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow-sky)"/>
    <text x="210" y="170" fill="#38bdf8" font-size="11" text-anchor="middle">VAPID Push 🔔</text>

    <!-- Client Smartphone Box -->
    <rect x="270" y="40" width="480" height="170" rx="16" fill="#111827" stroke="#94a3b8" stroke-width="2"/>
    <text x="510" y="65" fill="#f8fafc" font-size="14" text-anchor="middle" font-weight="bold">Client Device (PWA Installed)</text>

    <!-- Indexed DB -->
    <rect x="300" y="85" width="160" height="80" rx="8" fill="#022c22" stroke="#10b981" stroke-width="2"/>
    <text x="380" y="115" fill="#a7f3d0" font-size="14" text-anchor="middle" font-weight="bold">IndexedDB 📚</text>
    <text x="380" y="140" fill="#6ee7b7" font-size="11" text-anchor="middle">Local Caching (Dexie.js)</text>
    
    <path d="M 470 125 L 530 125" fill="none" stroke="#10b981" stroke-width="4" marker-end="url(#arrow-green)"/>
    <text x="500" y="115" fill="#a7f3d0" font-size="11" text-anchor="middle">0ms Load</text>

    <!-- UI View -->
    <rect x="550" y="85" width="160" height="80" rx="8" fill="#1e293b"/>
    <text x="630" y="125" fill="#f8fafc" font-size="14" text-anchor="middle" font-weight="bold">Optimistic UI ⚡</text>
    <text x="630" y="145" fill="#94a3b8" font-size="11" text-anchor="middle">Zero-lag scrolling</text>

    <defs>
        <marker id="arrow-sky" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
        </marker>
    </defs>
</svg>
