<svg viewBox="0 0 800 500" width="100%" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; border:1px solid #e5e7eb; border-radius:12px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);">
    <!-- Background -->
    <rect width="800" height="500" fill="#f8fafc"/>
    
    <!-- Smartphone Frame -->
    <rect x="30" y="50" width="340" height="400" rx="20" fill="#1f2937" stroke="#374151" stroke-width="4"/>
    <rect x="35" y="55" width="330" height="390" rx="16" fill="#111827"/>
    
    <!-- Chat Header -->
    <rect x="35" y="55" width="330" height="40" rx="16" fill="#1f2937"/>
    <text x="200" y="80" fill="#f3f4f6" font-size="14" text-anchor="middle" font-weight="bold">Alopop Secure Chat</text>
    
    <!-- Message Bubble 1 (Received + Image) -->
    <rect x="45" y="110" width="230" height="130" rx="10" fill="#374151"/>
    <rect x="55" y="120" width="210" height="90" rx="6" fill="#4b5563"/>
    <text x="160" y="170" fill="#9ca3af" font-size="12" text-anchor="middle">[ Image: Family BBQ ]</text>
    <text x="55" y="230" fill="#e5e7eb" font-size="12">Lit BBQ weekend with the fam! 🔥🥩</text>
    
    <!-- Fact-check Badge 1: AI Generated -->
    <rect x="55" y="250" width="60" height="20" rx="10" fill="#4c1d95" stroke="#8b5cf6" stroke-width="1"/>
    <text x="85" y="264" fill="#c4b5fd" font-size="11" text-anchor="middle" font-weight="bold">🤖 (?)</text>

    <!-- Click Arrow pointing to Modal 1 -->
    <path d="M 120 260 Q 300 180 430 180" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-purple)"/>
    <defs>
        <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6" />
        </marker>
    </defs>

    <!-- Modal Popup (Explanation) -->
    <filter id="drop-shadow">
        <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <rect x="440" y="120" width="320" height="120" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="2" filter="url(#drop-shadow)"/>
    <rect x="440" y="120" width="320" height="35" rx="12" fill="#f3f4f6"/>
    <text x="455" y="142" fill="#1f2937" font-size="14" font-weight="bold">🤖 [Real-time AI Vision Check]</text>
    
    <text x="455" y="175" fill="#4b5563" font-size="12">Reason: Detected the classic 'six-fingered hand' glitch</text>
    <text x="455" y="195" fill="#4b5563" font-size="12">plus a spooky Midjourney watermark. Busted! 🕵️‍♂️</text>
    
    <text x="455" y="225" fill="#ec4899" font-size="13" font-weight="bold">AI Confidence: 99.9%</text>

    <!-- Message Bubble 2 (Received Text Fake) -->
    <rect x="45" y="285" width="310" height="35" rx="10" fill="#374151"/>
    <text x="55" y="307" fill="#e5e7eb" font-size="12">Fun fact: That BBQ pic is an unreleased Picasso. 🎨🤔</text>
    
    <!-- Fact-check Badge 2 -->
    <rect x="55" y="330" width="60" height="20" rx="10" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
    <text x="85" y="344" fill="#fca5a5" font-size="11" text-anchor="middle" font-weight="bold">🚨 (?)</text>

    <!-- Click Arrow pointing to Modal 2 -->
    <path d="M 120 340 Q 300 340 430 360" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-red)"/>
    <defs>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>

    <!-- Modal Popup 2 (Text Fake) -->
    <rect x="440" y="290" width="320" height="120" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="2" filter="url(#drop-shadow)"/>
    <rect x="440" y="290" width="320" height="35" rx="12" fill="#fee2e2"/>
    <text x="455" y="312" fill="#991b1b" font-size="14" font-weight="bold">🚨 [Fake News Alert!]</text>
    
    <text x="455" y="345" fill="#4b5563" font-size="12">Reason: Picasso passed away in 1973 and certainly</text>
    <text x="455" y="365" fill="#4b5563" font-size="12">didn't paint your suburban BBQ with an AI app. 🛑</text>
    
    <text x="455" y="395" fill="#ef4444" font-size="13" font-weight="bold">AI Confidence: 100%</text>
    
    <text x="400" y="480" fill="#6b7280" font-size="12" text-anchor="middle" font-weight="bold">Fig 1. Real-time Fact-Check Badges &amp; Reason Popups in Action (Alopop Core Architecture)</text>
</svg>
