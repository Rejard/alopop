<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a" rx="16"/>
  
  <!-- Title & Philosophy -->
  <text x="400" y="50" fill="#f8fafc" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle">Alopop Core Architecture</text>
  <text x="400" y="80" fill="#94a3b8" font-family="sans-serif" font-size="16" font-style="italic" text-anchor="middle">"Relentless Fact-Checking in Real-time Chat"</text>

  <!-- Left: Users & Chat -->
  <g transform="translate(50, 120)">
    <rect width="180" height="300" fill="#1e293b" rx="12" stroke="#334155" stroke-width="2"/>
    <text x="90" y="40" fill="#e2e8f0" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Users</text>
    
    <circle cx="50" cy="100" r="20" fill="#3b82f6"/>
    <text x="50" y="105" fill="#fff" font-family="sans-serif" font-size="14" text-anchor="middle">U1</text>
    
    <circle cx="50" cy="180" r="20" fill="#8b5cf6"/>
    <text x="50" y="185" fill="#fff" font-family="sans-serif" font-size="14" text-anchor="middle">U2</text>
    
    <!-- Messages flow -->
    <path d="M 80 100 Q 130 140 80 180" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="100" y="145" fill="#cbd5e1" font-family="sans-serif" font-size="12">Messages</text>
    <text x="100" y="160" fill="#cbd5e1" font-family="sans-serif" font-size="12">Images/Video</text>

    <!-- AI Friend -->
    <rect x="25" y="230" width="130" height="50" fill="#0f766e" rx="8"/>
    <text x="90" y="260" fill="#ccfbf1" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">AI Friend</text>
  </g>

  <!-- Arrow to Fact Check Engine -->
  <path d="M 230 270 L 310 270" fill="none" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  
  <!-- Center: Fact-Checking Engine -->
  <g transform="translate(320, 150)">
    <rect width="200" height="240" fill="#1e293b" rx="12" stroke="#6366f1" stroke-width="3"/>
    <text x="100" y="40" fill="#e0e7ff" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Fact-Check Engine</text>
    
    <rect x="20" y="70" width="160" height="40" fill="#312e81" rx="6"/>
    <text x="100" y="95" fill="#c7d2fe" font-family="sans-serif" font-size="14" text-anchor="middle">Data Interception</text>
    
    <rect x="20" y="120" width="160" height="40" fill="#3730a3" rx="6"/>
    <text x="100" y="145" fill="#c7d2fe" font-family="sans-serif" font-size="14" text-anchor="middle">Context Analysis</text>

    <rect x="20" y="170" width="160" height="40" fill="#4338ca" rx="6"/>
    <text x="100" y="195" fill="#c7d2fe" font-family="sans-serif" font-size="14" text-anchor="middle">Validation &amp; Reply</text>
  </g>

  <!-- Arrow to External APIs -->
  <path d="M 520 270 L 590 270" fill="none" stroke="#10b981" stroke-width="4" marker-end="url(#arrow-green)"/>

  <!-- Right: Custom APIs / Sponsors -->
  <g transform="translate(600, 120)">
    <rect width="160" height="300" fill="#1e293b" rx="12" stroke="#10b981" stroke-width="2"/>
    <text x="80" y="40" fill="#d1fae5" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">LLM / Vision APIs</text>
    
    <circle cx="80" cy="110" r="35" fill="#047857"/>
    <text x="80" y="115" fill="#fff" font-family="sans-serif" font-size="14" text-anchor="middle">Personal Key</text>
    
    <circle cx="80" cy="200" r="35" fill="#059669"/>
    <text x="80" y="200" fill="#fff" font-family="sans-serif" font-size="12" text-anchor="middle">Sponsored</text>
    <text x="80" y="215" fill="#fff" font-family="sans-serif" font-size="12" text-anchor="middle">Key (Shared)</text>

    <text x="80" y="270" fill="#a7f3d0" font-family="sans-serif" font-size="12" text-anchor="middle">OpenAI, Anthropic,</text>
    <text x="80" y="285" fill="#a7f3d0" font-family="sans-serif" font-size="12" text-anchor="middle">Gemini, etc.</text>
  </g>

  <!-- Markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
