<svg viewBox="0 0 800 250" width="100%" xmlns="http://www.w3.org/2000/svg" style="background:#0f172a; border-radius:12px;">
    <rect width="800" height="250" fill="#0f172a" rx="12"/>
    
    <!-- User 1 -->
    <circle cx="100" cy="80" r="25" fill="#fbbf24"/>
    <text x="100" y="85" fill="#78350f" font-size="14" text-anchor="middle" font-weight="bold">U1</text>
    <text x="100" y="125" fill="#94a3b8" font-size="12" text-anchor="middle">- 10 🪙</text>

    <!-- User 2 -->
    <circle cx="100" cy="170" r="25" fill="#f59e0b"/>
    <text x="100" y="175" fill="#78350f" font-size="14" text-anchor="middle" font-weight="bold">U2</text>
    <text x="100" y="215" fill="#94a3b8" font-size="12" text-anchor="middle">- 10 🪙</text>

    <!-- User 3 -->
    <circle cx="280" cy="125" r="25" fill="#d97706"/>
    <text x="280" y="130" fill="#fffbeb" font-size="14" text-anchor="middle" font-weight="bold">U3</text>
    <text x="280" y="170" fill="#94a3b8" font-size="12" text-anchor="middle">- 10 🪙</text>

    <!-- Coin trajectories -->
    <path d="M 130 80 Q 200 40 380 110" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,4"/>
    <path d="M 130 170 Q 200 210 380 140" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,4"/>
    <path d="M 310 125 L 380 125" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="4,4"/>

    <!-- Central Pool -->
    <rect x="390" y="75" width="160" height="100" rx="16" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="470" y="110" fill="#fcd34d" font-size="16" text-anchor="middle" font-weight="bold">Shared Coin Pool</text>
    <text x="470" y="140" fill="#ffffff" font-size="20" text-anchor="middle" font-weight="bold">30 🪙</text>

    <path d="M 560 125 L 610 125" fill="none" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrow-yellow)"/>
    <text x="585" y="115" fill="#d97706" font-size="11" text-anchor="middle" font-weight="bold">Pay API Bill</text>

    <!-- Large AI Engine -->
    <rect x="630" y="65" width="120" height="120" rx="10" fill="#065f46"/>
    <text x="690" y="120" fill="#a7f3d0" font-size="14" text-anchor="middle" font-weight="bold">Heavy AI Task</text>
    <text x="690" y="140" fill="#6ee7b7" font-size="10" text-anchor="middle">(Vision + Web Search)</text>

    <defs>
        <marker id="arrow-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
        </marker>
    </defs>
</svg>
