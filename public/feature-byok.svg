<svg viewBox="0 0 800 250" width="100%" xmlns="http://www.w3.org/2000/svg" style="background:#0f172a; border-radius:12px;">
    <rect width="800" height="250" fill="#0f172a" rx="12"/>
    
    <!-- User 1: Personal Key -->
    <rect x="50" y="50" width="200" height="60" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="150" y="75" fill="#f8fafc" font-size="14" text-anchor="middle" font-weight="bold">User (Individual)</text>
    <text x="150" y="95" fill="#94a3b8" font-size="12" text-anchor="middle">Personal API Key</text>
    
    <!-- User 2: Sponsored -->
    <rect x="50" y="140" width="200" height="60" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="150" y="165" fill="#f8fafc" font-size="14" text-anchor="middle" font-weight="bold">User / Guest</text>
    <text x="150" y="185" fill="#94a3b8" font-size="12" text-anchor="middle">No Key / Sponsored</text>
    
    <!-- Arrows -->
    <path d="M 260 80 L 330 110" fill="none" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <path d="M 260 170 L 330 140" fill="none" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)"/>
    
    <!-- Central Switcher -->
    <rect x="350" y="65" width="180" height="120" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <text x="440" y="100" fill="#f8fafc" font-size="16" text-anchor="middle" font-weight="bold">Key Router</text>
    <rect x="375" y="120" width="130" height="25" rx="4" fill="#3b82f6"/>
    <text x="440" y="137" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold">BYOK Auth</text>
    <rect x="375" y="150" width="130" height="25" rx="4" fill="#10b981"/>
    <text x="440" y="167" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold">Sponsor Auth</text>
    
    <!-- Arrow to API -->
    <path d="M 540 125 L 610 125" fill="none" stroke="#6366f1" stroke-width="4" marker-end="url(#arrow-indigo)"/>
    
    <!-- LLM Providers -->
    <rect x="630" y="65" width="120" height="120" rx="60" fill="#312e81"/>
    <text x="690" y="115" fill="#c7d2fe" font-size="14" text-anchor="middle" font-weight="bold">LLM APIs</text>
    <text x="690" y="135" fill="#818cf8" font-size="10" text-anchor="middle">(OpenAI, Gemini)</text>
    <text x="690" y="150" fill="#818cf8" font-size="10" text-anchor="middle">Cost Calculated</text>
    
    <defs>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
        </marker>
        <marker id="arrow-indigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1" />
        </marker>
    </defs>
</svg>
