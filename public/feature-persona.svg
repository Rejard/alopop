<svg viewBox="0 0 800 250" width="100%" xmlns="http://www.w3.org/2000/svg" style="background:#0f172a; border-radius:12px;">
    <rect width="800" height="250" fill="#0f172a" rx="12"/>
    
    <!-- Persona Config Panel -->
    <rect x="50" y="40" width="220" height="170" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
    <text x="160" y="70" fill="#f8fafc" font-size="16" text-anchor="middle" font-weight="bold">Persona Settings</text>
    
    <!-- MBTI Slider -->
    <rect x="70" y="90" width="180" height="25" rx="4" fill="#334155"/>
    <rect x="70" y="90" width="130" height="25" rx="4" fill="#ec4899"/>
    <text x="160" y="107" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="bold">MBTI: ENTP (Debater)</text>
    
    <!-- Age/Gender Slider -->
    <rect x="70" y="125" width="180" height="25" rx="4" fill="#334155"/>
    <rect x="70" y="125" width="80" height="25" rx="4" fill="#f43f5e"/>
    <text x="160" y="142" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="bold">Age: 25 / Female</text>
    
    <!-- Tone Slider -->
    <rect x="70" y="160" width="180" height="25" rx="4" fill="#334155"/>
    <rect x="70" y="160" width="160" height="25" rx="4" fill="#e11d48"/>
    <text x="160" y="177" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="bold">Tone: Sarcastic &amp; Witty</text>

    <!-- Arrow -->
    <path d="M 285 125 L 365 125" fill="none" stroke="#ec4899" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow-pink)"/>
    <text x="325" y="115" fill="#f472b6" font-size="11" text-anchor="middle">System Prompt Injection</text>

    <!-- AI Bot Engine -->
    <rect x="380" y="55" width="160" height="140" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="460" cy="110" r="30" fill="#4c1d95"/>
    <text x="460" y="115" fill="#ffffff" font-size="16" text-anchor="middle">🤖</text>
    <text x="460" y="165" fill="#c4b5fd" font-size="14" text-anchor="middle" font-weight="bold">Custom AI Friend</text>
    <text x="460" y="180" fill="#a78bfa" font-size="11" text-anchor="middle">Context-Aware Memory</text>

    <!-- Arrow output -->
    <path d="M 555 125 L 610 125" fill="none" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrow-purple)"/>

    <!-- Chat Output -->
    <rect x="630" y="75" width="140" height="100" rx="8" fill="#374151"/>
    <text x="640" y="110" fill="#e5e7eb" font-size="12">"Oh please, you</text>
    <text x="640" y="130" fill="#e5e7eb" font-size="12">really thought</text>
    <text x="640" y="150" fill="#e5e7eb" font-size="12">that was true? 😂"</text>

    <defs>
        <marker id="arrow-pink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ec4899" />
        </marker>
        <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6" />
        </marker>
    </defs>
</svg>
